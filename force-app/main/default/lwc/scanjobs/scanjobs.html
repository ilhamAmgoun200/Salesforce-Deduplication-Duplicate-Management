<template>
    <div class="slds-var-p-around_medium">
        <!-- Page Header -->
        <div class="slds-page-header slds-var-m-bottom_medium">
            <div class="slds-page-header__row">
                <div class="slds-page-header__col-title">
                    <div class="slds-media">
                        <div class="slds-media__figure">
                            <lightning-icon icon-name="utility:job" size="medium"></lightning-icon>
                        </div>
                        <div class="slds-media__body">
                            <h1 class="slds-page-header__title">Scan Jobs</h1>
                            <p class="slds-page-header__name-meta">
                                {totalJobs} job(s) · {runningJobsCount} en cours · {scheduledJobsCount} planifiés
                            </p>
                        </div>
                    </div>
                </div>
                <div class="slds-page-header__col-actions">
                    <lightning-button
                        variant="brand"
                        label="Nouveau scan"
                        icon-name="utility:add"
                        onclick={handleNewScan}>
                    </lightning-button>
                </div>
            </div>
        </div>

        <!-- Onglets -->
        <div class="slds-tabs_default slds-var-m-bottom_medium">
            <div class="slds-tabs_default__nav" role="tablist">
                <a href="javascript:void(0);" class={runningTabClass} role="tab" onclick={handleShowRunning}>
                    <span class="slds-tabs_default__link">En cours ({runningJobsCount})</span>
                </a>
                 <a href="javascript:void(0);" class={pausedTabClass} role="tab" onclick={handleShowPaused}>
                    <span class="slds-tabs_default__link">En pause ({pausedJobsCount})</span>
                </a>
                <a href="javascript:void(0);" class={scheduledTabClass} role="tab" onclick={handleShowScheduled}>
                    <span class="slds-tabs_default__link">Planifiés ({scheduledJobsCount})</span>
                </a>
                <a href="javascript:void(0);" class={completedTabClass} role="tab" onclick={handleShowCompleted}>
                    <span class="slds-tabs_default__link">Terminés ({completedJobsCount})</span>
                </a>
            </div>
        </div>

                <!-- Barre de recherche et filtres -->
        <div class="search-filter-bar slds-var-m-bottom_medium">
            <div class="slds-grid slds-gutters">
                <div class="slds-col slds-size_1-of-2">
                    <lightning-input
                        type="search"
                        label="Rechercher"
                        placeholder="Rechercher un scan par nom..."
                        value={searchTerm}
                        onchange={handleSearchChange}>
                    </lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <lightning-combobox
                        label="Filtrer par objet"
                        placeholder="Tous les objets"
                        options={objectFilterOptions}
                        value={filterObject}
                        onchange={handleObjectFilterChange}>
                    </lightning-combobox>
                </div>
            </div>
        </div>

        <!-- ========== LISTE DES JOBS ========== -->
        <!-- ========== TABLEAU DES JOBS ========== -->
        
        <!-- Running Jobs Table -->
        <template if:true={showRunning}>
            <template if:true={hasRunningJobs}>
                <div class="jobs-table-container">
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th>Nom du scan</th>
                                <th>Objet</th>
                                <th>Règles utilisées</th>
                                <th>Progression</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={displayRunningJobs} for:item="job">
                                <tr key={job.id} data-job-id={job.id} onclick={handleSelectJob}>
                                    <td>
                                        <div class="job-name-cell">
                                            <lightning-icon icon-name="utility:refresh" size="x-small" class="job-icon-running"></lightning-icon>
                                            <span>{job.name}</span>
                                        </div>
                                    </td>
                                    <td>{job.objectLabel}</td>
                                    <td>{job.rulesLabel}</td>
                                    <td>
                                        <div class="job-progress-cell">
                                            <lightning-progress-bar value={job.progress} size="small"></lightning-progress-bar>
                                            <span class="progress-pct">{job.progress}%</span>
                                        </div>
                                    </td>
                                    <td>
                                        <div class="action-btns">
                                            <lightning-button-icon
                                                icon-name="utility:pause"
                                                variant="border-filled"
                                                size="small"
                                                title="Pause"
                                                data-job-id={job.id}
                                                onclick={handlePauseJob}>
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:close"
                                                variant="border-filled"
                                                size="small"
                                                title="Arrêter"
                                                data-job-id={job.id}
                                                onclick={handleStopJob}>
                                            </lightning-button-icon>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
            <template if:false={hasRunningJobs}>
                <div class="slds-text-align_center slds-var-p-vertical_xx-large">
                    <lightning-icon icon-name="utility:success" size="large" variant="success"></lightning-icon>
                    <p class="slds-var-m-top_small">Aucun scan en cours</p>
                </div>
            </template>
        </template>

        <!-- Paused Jobs Table -->
        <template if:true={showPaused}>
            <template if:true={hasPausedJobs}>
                <div class="jobs-table-container">
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th>Nom du scan</th>
                                <th>Objet</th>
                                <th>Règles utilisées</th>
                                <th>Progression</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={displayPausedJobs} for:item="job">
                                <tr key={job.id} data-job-id={job.id} onclick={handleSelectJob}>
                                    <td>
                                        <div class="job-name-cell">
                                            <lightning-icon icon-name="utility:pause" size="x-small" class="job-icon-paused"></lightning-icon>
                                            <span>{job.name}</span>
                                        </div>
                                    </td>
                                    <td>{job.objectLabel}</td>
                                    <td>{job.rulesLabel}</td>
                                    <td>
                                        <div class="job-progress-cell">
                                            <lightning-progress-bar value={job.progress} size="small"></lightning-progress-bar>
                                            <span class="progress-pct">{job.progress}%</span>
                                        </div>
                                    </td>
                                    <td>
                                        <div class="action-btns">
                                            <lightning-button-icon
                                                icon-name="utility:play"
                                                variant="border-filled"
                                                size="small"
                                                title="Reprendre"
                                                data-job-id={job.id}
                                                onclick={handleResumeJob}>
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:close"
                                                variant="border-filled"
                                                size="small"
                                                title="Supprimer"
                                                data-job-id={job.id}
                                                onclick={handleStopJob}>
                                            </lightning-button-icon>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
            <template if:false={hasPausedJobs}>
                <div class="slds-text-align_center slds-var-p-vertical_xx-large">
                    <lightning-icon icon-name="utility:pause" size="large" variant="neutral"></lightning-icon>
                    <p class="slds-var-m-top_small">Aucun scan en pause</p>
                </div>
            </template>
        </template>

        <!-- Scheduled Jobs Table -->
        <template if:true={showScheduled}>
            <template if:true={hasScheduledJobs}>
                <div class="jobs-table-container">
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th>Nom du scan</th>
                                <th>Objet</th>
                                <th>Règles utilisées</th>
                                <th>Planifié le</th>
                                <th>Type</th>
                                <th>Prochaine exécution</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={displayScheduledJobs} for:item="job">
                                <tr key={job.id} data-job-id={job.id} onclick={handleSelectJob}>
                                    <td>
                                        <div class="job-name-cell">
                                            <lightning-icon icon-name="utility:schedule" size="x-small" class="job-icon-scheduled"></lightning-icon>
                                            <span>{job.name}</span>
                                        </div>
                                    </td>
                                    <td>{job.objectLabel}</td>
                                    <td>{job.rulesLabel}</td>
                                    <td>{job.scheduledDateLabel}</td>
                                    <td>
            <span class="slds-badge {job.scheduleType === 'RECURRING' ? 'slds-theme_info' : 'slds-theme_neutral'}">
                {job.scheduleTypeLabel}
            </span>
        </td>
        <td>
            <template if:true={job.nextRunDate}>
                {job.nextRunDate}
            </template>
            <template if:false={job.nextRunDate}>
                <span class="empty-value">À définir</span>
            </template>
        </td>
                                    <td>
                                        <div class="action-btns">
                                            <lightning-button-icon
                                                icon-name="utility:edit"
                                                variant="border-filled"
                                                size="small"
                                                title="Modifier"
                                                data-job-id={job.id}
                                                onclick={handleEditJob}>
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:delete"
                                                variant="border-filled"
                                                size="small"
                                                title="Supprimer"
                                                data-job-id={job.id}
                                                onclick={handleDeleteJob}>
                                            </lightning-button-icon>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
            <template if:false={hasScheduledJobs}>
                <div class="slds-text-align_center slds-var-p-vertical_xx-large">
                    <lightning-icon icon-name="utility:schedule" size="large" variant="neutral"></lightning-icon>
                    <p class="slds-var-m-top_small">Aucun scan planifié</p>
                </div>
            </template>
        </template>

        <!-- Completed Jobs Table -->
        <template if:true={showCompleted}>
            <template if:true={hasCompletedJobs}>
                <div class="jobs-table-container">
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th>Nom du scan</th>
                                <th>Objet</th>
                                <th>Règles utilisées</th>
                                <th>Doublons trouvés</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={displayCompletedJobs} for:item="job">
                                <tr key={job.id} data-job-id={job.id} onclick={handleSelectJob}>
                                    <td>
                                        <div class="job-name-cell">
                                            <lightning-icon icon-name="utility:success" size="x-small" class="job-icon-completed"></lightning-icon>
                                            <span>{job.name}</span>
                                        </div>
                                    </td>
                                    <td>{job.objectLabel}</td>
                                    <td>{job.rulesLabel}</td>
                                    <td><span class="duplicates-count">{job.duplicatesFound}</span></td>
                                    <td>
                                        <div class="action-btns">
                                            <lightning-button-icon
                                                icon-name="utility:download"
                                                variant="border-filled"
                                                size="small"
                                                title="Exporter CSV"
                                                data-job-id={job.id}
                                                onclick={handleExportCsv}>
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:delete"
                                                variant="border-filled"
                                                size="small"
                                                title="Supprimer"
                                                data-job-id={job.id}
                                                onclick={handleDeleteJob}>
                                            </lightning-button-icon>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
            <template if:false={hasCompletedJobs}>
                <div class="slds-text-align_center slds-var-p-vertical_xx-large">
                    <lightning-icon icon-name="utility:success" size="large" variant="neutral"></lightning-icon>
                    <p class="slds-var-m-top_small">Aucun scan terminé</p>
                </div>
            </template>
        </template>
        <!-- ========== MODAL : NOUVEAU SCAN (MULTI-ÉTAPES) ========== -->
        <template if:true={showNewScanModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close" onclick={handleCloseNewScanModal}>
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title">Nouveau scan - Étape {currentStep} sur 5</h2>
                    </header>
                    <div class="slds-modal__content slds-var-p-around_medium">
                        <!-- Étape 1 : Choix de l'objet -->
                        <template if:true={isStep1}>
                            <div class="slds-form slds-form_stacked">
                                <lightning-combobox
                                    label="Objet à scanner"
                                    options={objectOptions}
                                    value={newScanConfig.objectApiName}
                                    data-field="objectApiName"
                                    onchange={handleNewScanChange}
                                    required>
                                </lightning-combobox>
                            </div>
                        </template>

                        <!-- Étape 2 : Choix des règles -->
                        <template if:true={isStep2}>
                            <div class="slds-form slds-form_stacked">
                                <label class="slds-form-element__label">Règles de matching</label>
                                <template for:each={matchingRuleOptionsWithCheck} for:item="rule">
                                    <div key={rule.value} class="slds-var-m-bottom_xx-small">
                                        <lightning-input
                                            type="checkbox"
                                            label={rule.label}
                                            value={rule.value}
                                            checked={rule.checked}
                                            data-rule-value={rule.value}
                                            onchange={handleRuleCheckbox}>
                                        </lightning-input>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- Étape 3 : Périmètre et limite -->
                        <template if:true={isStep3}>
                            <div class="slds-form slds-form_stacked">
                                <lightning-combobox
                                    label="Périmètre"
                                    options={scopeOptions}
                                    value={newScanConfig.scope}
                                    data-field="scope"
                                    onchange={handleNewScanChange}>
                                </lightning-combobox>
                                <lightning-input
                                    type="number"
                                    label="Limite enregistrements (0 = aucune limite)"
                                    value={newScanConfig.recordLimit}
                                    data-field="recordLimit"
                                    onchange={handleNewScanChange}>
                                </lightning-input>
                            </div>
                        </template>

                        <!-- Étape 4 : Mode d'exécution et options -->
                        <template if:true={isStep4}>
                            <div class="slds-form slds-form_stacked">
                                <lightning-radio-group
                                    label="Mode d'exécution"
                                    options={executionModeOptions}
                                    value={newScanConfig.executionMode}
                                    data-field="executionMode"
                                    onchange={handleNewScanChange}>
                                </lightning-radio-group>
                                
                                <template if:true={showScheduleDate}>
                                    <lightning-input
                                        type="datetime-local"
                                        label="Date et heure de début"
                                        value={newScanConfig.scheduledDateTime}
                                        data-field="scheduledDateTime"
                                        onchange={handleNewScanChange}>
                                    </lightning-input>
                                </template>

                                <template if:true={showRecurrenceOptions}>
                                    <lightning-combobox
                                        label="Fréquence"
                                        options={recurrenceOptions}
                                        value={newScanConfig.recurrence}
                                        data-field="recurrence"
                                        onchange={handleNewScanChange}>
                                    </lightning-combobox>
                                    <!-- Date de début (obligatoire) -->
    <lightning-input
        type="datetime-local"
        label="Date et heure de début {requiredStar}"
        value={newScanConfig.startDateTime}
        data-field="startDateTime"
        required
        onchange={handleNewScanChange}>
    </lightning-input>
    
    <!-- Date de fin (optionnelle) -->
    <lightning-input
        type="datetime-local"
        label="Date de fin (optionnelle)"
        value={newScanConfig.endDateTime}
        data-field="endDateTime"
        onchange={handleNewScanChange}>
    </lightning-input>
                                </template>

                                <lightning-input
                                    type="toggle"
                                    label="Fusionner auto les correspondances à 100%"
                                    checked={newScanConfig.autoMergeExact}
                                    data-field="autoMergeExact"
                                    onchange={handleNewScanChange}>
                                </lightning-input>

                                <lightning-input
                                    type="toggle"
                                    label="Envoyer un email de rapport à la fin"
                                    checked={newScanConfig.sendReport}
                                    data-field="sendReport"
                                    onchange={handleNewScanChange}>
                                </lightning-input>

                                <!-- Champ email (apparaît si le toggle est activé) -->
                                <template if:true={newScanConfig.sendReport}>
                                    <lightning-input
                                        type="email"
                                        label="Destinataires (séparés par des virgules)"
                                        placeholder="exemple@domaine.com, autre@domaine.com"
                                        value={newScanConfig.emailRecipients}
                                        data-field="emailRecipients"
                                        onchange={handleNewScanChange}>
                                    </lightning-input>
                                </template>
                                
                            </div>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Annuler" onclick={handleCloseNewScanModal}></lightning-button>
                        <template if:true={hasPreviousStep}>
                            <lightning-button label="Précédent" onclick={handlePreviousStep}></lightning-button>
                        </template>
                        <template if:true={hasNextStep}>
                            <lightning-button variant="brand" label="Suivant" onclick={handleNextStep}></lightning-button>
                        </template>
                        <template if:true={isLastStep}>
                            <lightning-button variant="brand" label={finalButtonLabel} onclick={handleStartNewScan}></lightning-button>
                        </template>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- ========== MODAL : DÉTAILS DU SCAN (DOUBLONS TROUVÉS) ========== -->
        <template if:true={showDuplicatesModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close" onclick={handleCloseDuplicatesModal}>
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title">Doublons trouvés - {selectedJobName}</h2>
                    </header>
                    <div class="slds-modal__content slds-var-p-around_medium">
                        <lightning-button label="Exporter CSV" variant="brand" onclick={handleExportCurrentCsv} class="slds-var-m-bottom_small"></lightning-button>
                        
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                            <thead>
                                <tr>
                                    <th>Objet</th>
                                    <th>Règle utilisée</th>
                                    <th>Confiance</th>
                                    <th>Statut</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={duplicateGroups} for:item="group">
                                    <tr key={group.id} data-group-id={group.id} onclick={handleOpenGroupPreview}>
                                        <td><span class="obj-pill" style={group.pillStyle}>{group.objectLabel}</span></td>
                                        <td>{group.ruleName}</td>
                                        <td>
                                            <div class="confidence-display">
                                                <div class="confidence-bar">
                                                    <div class="confidence-fill" style={group.confidenceStyle}></div>
                                                </div>
                                                <span class="confidence-pct" style={group.confidenceTextStyle}>{group.confidence}%</span>
                                            </div>
                                        </td>
                                        <td><span class="slds-badge {group.statusClass}">{group.statusLabel}</span></td>
                                        <td>
                                            <div class="action-btns">
                                            <lightning-button-icon
                                                icon-name="utility:preview"
                                                variant="border-filled"
                                                size="small"
                                                title="Prévisualiser"
                                                data-group-id={group.id}
                                                onclick={handlePreviewGroup}>
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:merge"
                                                variant="border-filled"
                                                size="small"
                                                title="Fusionner"
                                                data-group-id={group.id}
                                                onclick={handleMergeGroup}>
                                            </lightning-button-icon>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Fermer" onclick={handleCloseDuplicatesModal}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- ========== MODAL : DÉTAILS D'UN JOB (EN COURS/PLANIFIÉ) ========== -->
        <template if:true={showJobDetailModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close" onclick={handleCloseJobDetailModal}>
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title">Détails du scan - {selectedJobDetail?.name}</h2>
                    </header>
                    <div class="slds-modal__content slds-var-p-around_medium">
                        <div class="slds-form slds-form_stacked">
                            <div class="slds-form-element">
                                <label class="slds-form-element__label">Objet</label>
                                <div class="slds-form-element__control">{selectedJobDetail?.objectLabel}</div>
                            </div>
                            <div class="slds-form-element">
                                <label class="slds-form-element__label">Règles utilisées</label>
                                <div class="slds-form-element__control">{selectedJobDetail?.rulesLabel}</div>
                            </div>
                            <div class="slds-form-element">
                                <label class="slds-form-element__label">Périmètre</label>
                                <div class="slds-form-element__control">{selectedJobDetail?.scopeLabel}</div>
                            </div>
                            <div class="slds-form-element">
                                <label class="slds-form-element__label">Limite</label>
                                <div class="slds-form-element__control">{selectedJobDetail?.recordLimit || 'Illimitée'}</div>
                            </div>
                            <template if:true={isRunningJobDetail}>
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Progression</label>
                                    <div class="slds-form-element__control">
                                        <div class="job-progress-detail">
                                            <template if:true={selectedJobDetail}>
    <lightning-progress-bar value={selectedJobDetail.progress}></lightning-progress-bar>
</template>
                                            <span class="progress-pct">{selectedJobDetail?.progress}%</span>
                                        </div>
                                    </div>
                                </div>
                            </template>
                            <template if:true={isScheduledJobDetail}>
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Date planifiée</label>
                                    <div class="slds-form-element__control">{selectedJobDetail?.scheduledDateLabel}</div>
                                </div>
                            </template>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <template if:true={isScheduledJobDetail}>
                            <lightning-button label="Modifier" onclick={handleEditJobFromDetail}></lightning-button>
                        </template>
                        <template if:true={isRunningJobDetail}>
                            <lightning-button label="Pause" onclick={handlePauseJobFromDetail}></lightning-button>
                            <lightning-button label="Arrêter" variant="destructive" onclick={handleStopJobFromDetail}></lightning-button>
                        </template>
                        <lightning-button label="Fermer" variant="brand" onclick={handleCloseJobDetailModal}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- ========== MODAL : MODIFICATION D'UN JOB PLANIFIÉ ========== -->
        <template if:true={showEditJobModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close" onclick={handleCloseEditJobModal}>
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title">Modifier le scan planifié</h2>
                    </header>
                    <div class="slds-modal__content slds-var-p-around_medium">
                        <div class="slds-form slds-form_stacked">
                            <div class="slds-form-element">
                                <label class="slds-form-element__label">Objet</label>
                                <div class="slds-form-element__control">{editingJob?.objectLabel}</div>
                                <div class="slds-form-element__help">L'objet ne peut pas être modifié</div>
                            </div>
                            <lightning-combobox
                                label="Périmètre"
                                options={scopeOptions}
                                value={editingJobScope}
                                data-field="scope"
                                onchange={handleEditJobChange}>
                            </lightning-combobox>
                            <lightning-input
                                type="number"
                                label="Limite enregistrements"
                                value={editingJobRecordLimit}
                                data-field="recordLimit"
                                onchange={handleEditJobChange}>
                            </lightning-input>
                            <label class="slds-form-element__label">Règles de matching</label>
                            <template for:each={editRulesOptions} for:item="rule">
                                <div key={rule.value} class="slds-var-m-bottom_xx-small">
                                    <lightning-input
                                        type="checkbox"
                                        label={rule.label}
                                        value={rule.value}
                                        checked={rule.checked}
                                        data-rule-value={rule.value}
                                        onchange={handleEditRuleCheckbox}>
                                    </lightning-input>
                                </div>
                            </template>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Annuler" onclick={handleCloseEditJobModal}></lightning-button>
                        <lightning-button variant="brand" label="Enregistrer" onclick={handleSaveEditJob}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- ========== MODAL : CONFIRMATION DE SUPPRESSION ========== -->
        <template if:true={showDeleteConfirmModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open" aria-modal="true">
                <div class="slds-modal__container slds-modal__container_small">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close" onclick={handleCloseDeleteConfirmModal}>
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title">Confirmer la suppression</h2>
                    </header>
                    <div class="slds-modal__content slds-var-p-around_medium">
                        <p>Êtes-vous sûr de vouloir supprimer ce scan ?</p>
                        <p class="slds-var-m-top_x-small slds-text-color_error">Cette action est irréversible.</p>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Annuler" onclick={handleCloseDeleteConfirmModal}></lightning-button>
                        <lightning-button variant="destructive" label="Supprimer" onclick={handleConfirmDelete}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

               <!-- ========== MODAL : PRÉVISUALISATION ET FUSION DES DOUBLONS ========== -->
        <template if:true={showPreviewModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large" aria-modal="true">
                <div class="slds-modal__container slds-modal__container_extra-large">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close" onclick={handleClosePreviewModal}>
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title">Fusion des doublons - {previewGroupName}</h2>
                    </header>
                    <div class="slds-modal__content slds-var-p-around_medium">
                        <div class="preview-merge-container">
                            <!-- Colonne gauche : Liste des enregistrements avec leurs champs -->
                            <div class="preview-records-column">
                                <h3 class="preview-column-title">Enregistrements sources</h3>
                                <template for:each={previewGroupRecords} for:item="record">
                                    <div key={record.id} class="preview-record-card">
                                        <div class="preview-record-header">
                                            <lightning-icon icon-name="utility:record" size="x-small"></lightning-icon>
                                            <span class="preview-record-name">{record.name}</span>
                                            <span class="slds-badge {record.isMaster ? 'slds-theme_success' : 'slds-theme_warning'}">
                                                {record.isMaster ? 'Principal' : 'Doublon'}
                                            </span>
                                        </div>
                                        <div class="preview-record-fields">
                                            <template for:each={record.fields} for:item="field">
                                                <div key={field.id} class="preview-field-row" data-field-id={field.id} data-record-id={record.id}>
                                                    <span class="preview-field-label">{field.label}</span>
                                                    <div class="preview-field-value-wrapper">
                                                        <span class="preview-field-value">{field.value || '—'}</span>
                                                        <lightning-button-icon
                                                            icon-name="utility:check"
                                                            variant="border-filled"
                                                            size="x-small"
                                                            title="Utiliser cette valeur"
                                                            data-field-id={field.id}
                                                            data-record-id={record.id}
                                                            data-field-label={field.label}
                                                            data-field-value={field.value}
                                                            onclick={handleSelectMergeValue}>
                                                        </lightning-button-icon>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <!-- Colonne droite : Aperçu du résultat de fusion -->
                            <div class="preview-result-column">
                                <h3 class="preview-column-title">Résultat de la fusion</h3>
                                <div class="merge-result-card">
                                    <div class="merge-result-header">
                                        <lightning-icon icon-name="utility:merge" size="x-small"></lightning-icon>
                                        <span>Enregistrement final</span>
                                    </div>
                                    <div class="merge-result-fields">
                                        <template for:each={mergeResultFields} for:item="field">
                                            <div key={field.id} class="merge-field-row">
                                                <span class="merge-field-label">{field.label}</span>
                                                <span class="merge-field-value">
                                                    <template if:true={field.value}>
                                                        {field.value}
                                                    </template>
                                                    <template if:false={field.value}>
                                                        <span class="empty-value">—</span>
                                                    </template>
                                                </span>
                                                <span class="merge-field-source">({field.sourceLabel})</span>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Annuler" onclick={handleClosePreviewModal}></lightning-button>
                        <lightning-button variant="brand" label="Fusionner" icon-name="utility:merge" onclick={handleConfirmMergeFromPreview}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
