<template>
    <lightning-card title="Matching Rule - Test" icon-name="standard:rules">
        <div class="slds-p-around_medium">
            <h2>Composant de test Matching Rule</h2>
            <p>Ce composant sera utilisé pour les règles de correspondance.</p>
            <lightning-button 
                label="Tester la règle" 
                onclick={handleTest}>
            </lightning-button>

            <template if:true={result}>
                <div class="slds-m-top_medium">
                    <p><strong>Résultat :</strong> {result}</p>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
