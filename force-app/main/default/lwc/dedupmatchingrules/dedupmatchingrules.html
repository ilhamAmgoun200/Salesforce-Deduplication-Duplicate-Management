<template>
    <div class="slds-var-p-around_medium">

        <!-- Spinner global -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Chargement..." size="medium"></lightning-spinner>
        </template>

        <!-- Page Header (plus compact) -->
        <div class="slds-page-header slds-var-m-bottom_x-small">
            <div class="slds-page-header__row">
                <div class="slds-page-header__col-title">
                    <div class="slds-media">
                        <div class="slds-media__figure">
                            <lightning-icon icon-name="utility:rules" size="medium"></lightning-icon>
                        </div>
                        <div class="slds-media__body">
                            <h1 class="slds-page-header__title">Matching Rules</h1>
                            <p class="slds-page-header__name-meta">{rules.length} règles configurées · {activeRulesCount} actives</p>
                        </div>
                    </div>
                </div>
                <div class="slds-page-header__col-actions">
                    <div class="slds-page-header__controls">
                        <div class="slds-page-header__control">
                            <lightning-button
                                variant="brand"
                                label="Nouvelle règle"
                                icon-name="utility:add"
                                onclick={handleNewRule}>
                            </lightning-button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

                <!-- Barre d'outils : filtres + recherche + boutons -->
        <div class="toolbar">
            <div class="toolbar-left">
                <lightning-combobox
                    label=""
                    placeholder="Tous les objets"
                    options={objectFilterOptions}
                    value={filterObject}
                    onchange={handleObjectFilter}
                    class="filter-select">
                </lightning-combobox>
                <lightning-combobox
                    label=""
                    placeholder="Tous les statuts"
                    options={statusFilterOptions}
                    value={filterStatus}
                    onchange={handleStatusFilter}
                    class="filter-select">
                </lightning-combobox>
            </div>
            <div class="toolbar-center">
                <lightning-input
                    type="search"
                    label=""
                    placeholder="Rechercher une règle..."
                    value={searchTerm}
                    onchange={handleSearch}
                    class="search-input">
                </lightning-input>
            </div>
            <div class="toolbar-right">
                <lightning-button-group>
                    <lightning-button
                        label="Cartes"
                        icon-name="utility:kanban"
                        variant={cardViewVariant}
                        onclick={handleCardView}>
                    </lightning-button>
                    <lightning-button
                        label="Tableau"
                        icon-name="utility:table"
                        variant={tableViewVariant}
                        onclick={handleTableView}>
                    </lightning-button>
                </lightning-button-group>
            </div>
        </div>

        <!-- Rules List - Card View -->
        <template if:true={isCardView}>
            <template if:true={hasRules}>
                <div class="rules-list">
                    <template for:each={filteredRules} for:item="rule">
                        <div key={rule.id} class="rule-card">
                            <div class="rule-card__header">
                                <div class="rule-header-left">
                                    <div class="rule-obj-badge" style={rule.objBadgeStyle}>{rule.objectLabel}</div>
                                    <div class="rule-name">{rule.name}</div>
                                </div>
                                <div class="rule-header-right">
                                    <lightning-badge label={rule.statusLabel} class={rule.statusClass}></lightning-badge>
                                    <lightning-button-icon
                                        icon-name="utility:edit"
                                        variant="border-filled"
                                        size="small"
                                        title="Modifier"
                                        data-rule-id={rule.id}
                                        onclick={handleEditRule}>
                                    </lightning-button-icon>
                                    <lightning-button-icon
                                        icon-name={rule.toggleIcon}
                                        variant="border-filled"
                                        size="small"
                                        title={rule.toggleTitle}
                                        data-rule-id={rule.id}
                                        data-active={rule.isActive}
                                        onclick={handleToggleRule}>
                                    </lightning-button-icon>
                                    <lightning-button-icon
                                        icon-name="utility:delete"
                                        variant="border-filled"
                                        size="small"
                                        title="Supprimer"
                                        data-rule-id={rule.id}
                                        onclick={handleDeleteRule}>
                                    </lightning-button-icon>
                                </div>
                            </div>

                            <!-- Description (sous le nom, avec retour à la ligne si long) -->
                            <div class="rule-description">
                                <lightning-icon icon-name="utility:description" size="xx-small" class="rule-description__icon"></lightning-icon>
                                <span class="rule-description__text">{rule.description ? rule.description : 'Aucune description'}</span>
                            </div>

                            <!-- Criteria -->
                            <div class="rule-criteria">
                                <div class="criteria-label-row">
                                    <span class="criteria-label">Critères de matching</span>
                                    <template if:true={rule.filterLogic}>
                                        <span class="criteria-logic-badge">{rule.filterLogic}</span>
                                    </template>
                                </div>
                                <div class="criteria-list">
                                    <template for:each={rule.criteria} for:item="criterion">
                                        <template if:true={criterion.showAndSeparator}>
                                            <div key={criterion.separatorKey} class="and-separator-inline">
                                                <span class="and-label-inline">ET</span>
                                            </div>
                                        </template>
                                        <div key={criterion.id} class="criterion-item">
                                            <span class="criterion-order">#{criterion.orderNumber}</span>
                                            <span class="criterion-field">{criterion.fieldLabel}</span>
                                            <span class="criterion-op">{criterion.matchType}</span>
                                            <span class="criterion-weight">{criterion.weightLabel}</span>
                                            <template if:true={criterion.matchBlankFields}>
                                                <span class="criterion-blank-badge">Blank ✓</span>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>

                            <!-- Stats -->
                            <div class="rule-stats">
                                <div class="rule-stat">
                                    <span class="stat-value">{rule.matchesFound}</span>
                                    <span class="stat-label">Doublons trouvés</span>
                                </div>
                                <div class="rule-stat">
                                    <span class="stat-value">{rule.mergedCount}</span>
                                    <span class="stat-label">Fusionnés</span>
                                </div>
                                <div class="rule-stat">
                                    <span class="stat-value">{rule.confidenceLabel}</span>
                                    <span class="stat-label">Seuil de confiance</span>
                                </div>
                                <div class="rule-stat">
                                    <span class="stat-value">{rule.lastRunLabel}</span>
                                    <span class="stat-label">Dernier scan</span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </template>

        <!-- Table View -->
        <template if:true={isTableView}>
            <template if:true={hasRules}>
                <div class="rules-table-container">
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped rules-table">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th class="slds-text-title_caps" scope="col"><div class="slds-truncate">Objet</div></th>
                                <th class="slds-text-title_caps" scope="col"><div class="slds-truncate">Nom de la règle</div></th>
                                <th class="slds-text-title_caps" scope="col"><div class="slds-truncate">Description</div></th>
                                <th class="slds-text-title_caps" scope="col"><div class="slds-truncate">Critères</div></th>
                                <th class="slds-text-title_caps" scope="col"><div class="slds-truncate">Logique</div></th>
                                <th class="slds-text-title_caps" scope="col"><div class="slds-truncate">Statut</div></th>
                                <th class="slds-text-title_caps" scope="col"><div class="slds-truncate">Actions</div></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={filteredRules} for:item="rule">
                                <tr key={rule.id} class="slds-hint-parent">
                                    <td data-label="Objet">
                                        <div class="rule-obj-badge" style={rule.objBadgeStyle}>{rule.objectLabel}</div>
                                    </td>
                                    <td data-label="Nom">
                                        <div class="slds-truncate table-rule-name">{rule.name}</div>
                                    </td>
                                    <td data-label="Description">
                                        <div class="slds-truncate table-rule-desc">{rule.description ? rule.description : '—'}</div>
                                    </td>
                                    <td data-label="Critères">
                                        <div class="table-criteria-pills">
                                            <template for:each={rule.criteria} for:item="criterion">
                                                <span key={criterion.id} class="table-criterion-pill">
                                                    {criterion.fieldLabel} · {criterion.matchType}
                                                </span>
                                            </template>
                                        </div>
                                    </td>
                                    <td data-label="Logique">
                                        <template if:true={rule.filterLogic}>
                                            <span class="criteria-logic-badge">{rule.filterLogic}</span>
                                        </template>
                                        <template if:false={rule.filterLogic}>
                                            <span class="table-empty-cell">ET</span>
                                        </template>
                                    </td>
                                    <td data-label="Statut">
                                        <lightning-badge label={rule.statusLabel} class={rule.statusClass}></lightning-badge>
                                    </td>
                                    <td data-label="Actions">
                                        <div class="table-actions">
                                            <lightning-button-icon
                                                icon-name="utility:edit"
                                                variant="border-filled"
                                                size="small"
                                                title="Modifier"
                                                data-rule-id={rule.id}
                                                onclick={handleEditRule}>
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name={rule.toggleIcon}
                                                variant="border-filled"
                                                size="small"
                                                title={rule.toggleTitle}
                                                data-rule-id={rule.id}
                                                data-active={rule.isActive}
                                                onclick={handleToggleRule}>
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:delete"
                                                variant="border-filled"
                                                size="small"
                                                title="Supprimer"
                                                data-rule-id={rule.id}
                                                onclick={handleDeleteRule}>
                                            </lightning-button-icon>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
        </template>

        <!-- Empty state -->
        <template if:false={hasRules}>
            <div class="empty-rules">
                <lightning-icon icon-name="utility:rules" size="large" variant="inverse"></lightning-icon>
                <p>Aucune règle de matching configurée.</p>
                <lightning-button variant="brand" label="Créer ma première règle" onclick={handleNewRule}></lightning-button>
            </div>
        </template>

        <!-- Create/Edit Modal -->
        <template if:true={showModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={handleCloseModal}>
                            <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title">{modalTitle}</h2>
                    </header>

                    <div class="slds-modal__content slds-var-p-around_medium">
                        <!-- Basic Info -->
                        <div class="slds-form slds-form_stacked">
                            <lightning-input
                                label="Nom de la règle"
                                value={editRule.MasterLabel__c}
                                required
                                data-field="MasterLabel__c"
                                onchange={handleFieldChange}
                                onblur={handleMasterLabelBlur}>
                            </lightning-input>

                            <lightning-input
                                label="Nom technique"
                                value={editRule.DeveloperName__c}
                                required
                                placeholder="Ex: Lead_Email_Exact"
                                data-field="DeveloperName__c"
                                disabled={isEditMode}
                                onchange={handleFieldChange}>
                            </lightning-input>

                            <lightning-textarea
                                label="Description"
                                value={editRule.Description__c}
                                data-field="Description__c"
                                onchange={handleFieldChange}>
                            </lightning-textarea>

                            <lightning-combobox
                                label="Objet Salesforce"
                                placeholder="Sélectionner un objet"
                                options={salesforceObjectOptions}
                                value={editRule.SobjectType__c}
                                required
                                data-field="SobjectType__c"
                                onchange={handleFieldChange}>
                            </lightning-combobox>

                            <lightning-combobox
                                label="Action automatique"
                                placeholder="Sélectionner une action"
                                options={autoActionOptions}
                                value={editRule.autoAction}
                                data-field="autoAction"
                                onchange={handleFieldChange}>
                            </lightning-combobox>
                        </div>

                        <!-- Criteria Builder -->
                        <div class="criteria-builder slds-var-m-top_medium">
                            <div class="criteria-builder__header">
                                <span class="criteria-builder__title">Critères de matching</span>
                                <lightning-button
                                    label="+ Ajouter un critère"
                                    icon-name="utility:add"
                                    size="small"
                                    onclick={handleAddCriterion}>
                                </lightning-button>
                            </div>

                            <template for:each={editItems} for:item="criterion" for:index="idx">
                                <template if:true={criterion.showAndSeparator}>
                                    <div key={criterion.separatorKey} class="and-separator">
                                        <span class="and-label">{logicSeparatorLabel}</span>
                                    </div>
                                </template>

                                <div key={criterion.id} class="criterion-builder-row">
                                    <div class="criterion-order-badge">{criterion.orderNumber}</div>

                                    <lightning-combobox
                                        label="Champ"
                                        placeholder="Champ"
                                        options={fieldOptions}
                                        value={criterion.Field__c}
                                        data-idx={idx}
                                        data-subfield="Field__c"
                                        onchange={handleCriterionChange}
                                        class="criterion-col-large">
                                    </lightning-combobox>
                                    <lightning-combobox
                                        label="Type"
                                        placeholder="Type"
                                        options={matchTypeOptions}
                                        value={criterion.MatchingMethod__c}
                                        data-idx={idx}
                                        data-subfield="MatchingMethod__c"
                                        onchange={handleCriterionChange}
                                        class="criterion-col-medium">
                                    </lightning-combobox>
                                    <lightning-input
                                        type="number"
                                        label="Poids"
                                        min="0"
                                        max="100"
                                        value={criterion.Weight__c}
                                        data-idx={idx}
                                        data-subfield="Weight__c"
                                        onchange={handleCriterionChange}
                                        class="criterion-col-small">
                                    </lightning-input>
                                    <lightning-input
                                        type="checkbox"
                                        label="Match Blank"
                                        checked={criterion.MatchBlankFields__c}
                                        data-idx={idx}
                                        data-subfield="MatchBlankFields__c"
                                        onchange={handleCriterionCheckbox}
                                        class="criterion-col-check">
                                    </lightning-input>
                                    <template if:false={criterion.isFirst}>
                                        <lightning-button-icon
                                            icon-name="utility:delete"
                                            variant="border-filled"
                                            size="small"
                                            data-idx={idx}
                                            onclick={handleRemoveCriterion}
                                            class="criterion-delete">
                                        </lightning-button-icon>
                                    </template>
                                    <template if:true={criterion.isFirst}>
                                        <div class="criterion-delete"></div>
                                    </template>
                                </div>
                            </template>

                            <div class="filter-logic-row slds-var-m-top_small">
                                <lightning-combobox
                                    label="Logique entre les critères"
                                    options={filterLogicModeOptions}
                                    value={editRule.filterLogicMode}
                                    data-field="filterLogicMode"
                                    onchange={handleFieldChange}>
                                </lightning-combobox>

                                <template if:true={isCustomLogic}>
                                    <div class="slds-var-m-top_x-small">
                                        <lightning-input
                                            label="Logique personnalisée"
                                            placeholder="Ex : (1 AND 2) OR 3"
                                            value={editRule.BooleanFilter__c}
                                            data-field="BooleanFilter__c"
                                            onchange={handleFieldChange}>
                                        </lightning-input>
                                        <p class="filter-logic-hint">
                                            Utilisez les numéros de critères avec AND / OR et des parenthèses. Exemple : <strong>(1 AND 2) OR 3</strong>
                                        </p>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <footer class="slds-modal__footer">
                        <lightning-button label="Annuler" onclick={handleCloseModal}></lightning-button>
                        <lightning-button variant="brand" label="Enregistrer" onclick={handleSaveRule}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
