<template>
    <div class="slds-var-p-around_medium">
        <!-- Page Header -->
        <div class="slds-page-header slds-var-m-bottom_medium">
            <div class="slds-page-header__row">
                <div class="slds-page-header__col-title">
                    <div class="slds-media">
                        <div class="slds-media__figure">
                            <lightning-icon icon-name="utility:search" size="medium"></lightning-icon>
                        </div>
                        <div class="slds-media__body">
                            <h1 class="slds-page-header__title">Scan and Merge</h1>
                            <p class="slds-page-header__name-meta">
                                {totalDuplicates} doublons detectes | {selectedCount} selectionnes
                            </p>
                        </div>
                    </div>
                </div>
                <div class="slds-page-header__col-actions">
                    <div class="slds-page-header__controls">
                        <div class="slds-page-header__control">
                            <lightning-button
                                label="Exporter la liste"
                                icon-name="utility:download"
                                onclick={handleExport}>
                            </lightning-button>
                        </div>
                        <div class="slds-page-header__control">
                            <lightning-button
                                label="Fusionner la selection"
                                icon-name="utility:merge"
                                disabled={isMergeDisabled}
                                onclick={handleMergeSelected}>
                            </lightning-button>
                        </div>
                        <div class="slds-page-header__control">
                            <lightning-button
                                variant="brand"
                                label="Nouveau scan"
                                icon-name="utility:refresh"
                                onclick={handleOpenScanModal}>
                            </lightning-button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scan Config Modal -->
        <template if:true={showScanModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={handleCloseScanModal}>
                            <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title">Configurer et lancer un scan</h2>
                    </header>
                    <div class="slds-modal__content slds-var-p-around_medium">
                        <div class="slds-form slds-form_stacked">
                            <lightning-combobox
                                label="Objet a scanner"
                                options={objectScanOptions}
                                value={scanConfig.objectApiName}
                                data-field="objectApiName"
                                onchange={handleScanConfigChange}>
                            </lightning-combobox>
                            <lightning-combobox
                                label="Regle de matching"
                                options={ruleOptions}
                                value={scanConfig.ruleId}
                                data-field="ruleId"
                                onchange={handleScanConfigChange}>
                            </lightning-combobox>
                            <lightning-combobox
                                label="Perimetre"
                                options={scopeOptions}
                                value={scanConfig.scope}
                                data-field="scope"
                                onchange={handleScanConfigChange}>
                            </lightning-combobox>
                            <lightning-input
                                type="number"
                                label="Limite enregistrements (0 = aucune limite)"
                                value={scanConfig.recordLimit}
                                data-field="recordLimit"
                                onchange={handleScanConfigChange}>
                            </lightning-input>
                            <lightning-input
                              type="toggle"
                              label="Fusionner auto les correspondances a 100%"
                              checked={scanConfig.autoMergeExact}
                              data-field="autoMergeExact"
                              onchange={handleScanConfigChange}>
                            </lightning-input>

                            <lightning-input
                              type="toggle"
                              label="Envoyer un email de rapport a la fin"
                              checked={scanConfig.sendReport}
                              data-field="sendReport"
                              onchange={handleScanConfigChange}>
                            </lightning-input>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Annuler" onclick={handleCloseScanModal}></lightning-button>
                        <lightning-button variant="brand" label="Lancer le scan" icon-name="utility:play" onclick={handleLaunchScan}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Active Scan Progress Banner -->
        <template if:true={hasScanRunning}>
            <div class="scan-progress-banner slds-var-m-bottom_medium">
                <div class="scan-banner-left">
                    <lightning-spinner size="small" alternative-text="Scan en cours..."></lightning-spinner>
                    <div class="scan-banner-info">
                        <div class="scan-banner-title">{activeScan.name} en cours...</div>
                        <div class="scan-banner-meta">{activeScan.processed} / {activeScan.total} enregistrements analyses</div>
                    </div>
                </div>
                <div class="scan-banner-right">
                    <lightning-progress-bar value={activeScan.progress} size="large" class="scan-banner-bar"></lightning-progress-bar>
                    <span class="scan-banner-pct">{activeScan.progressLabel}</span>
                    <lightning-button label="Annuler" variant="destructive-text" onclick={handleCancelScan}></lightning-button>
                </div>
            </div>
        </template>

        <!-- Filters -->
        <div class="scan-filters slds-var-m-bottom_small">
            <lightning-combobox
                label=""
                placeholder="Tous les objets"
                options={objectFilterOptions}
                value={filterObject}
                onchange={handleObjectFilter}
                class="filter-item">
            </lightning-combobox>
            <lightning-combobox
                label=""
                placeholder="Toutes les regles"
                options={ruleFilterOptions}
                value={filterRule}
                onchange={handleRuleFilter}
                class="filter-item">
            </lightning-combobox>
            <lightning-combobox
                label=""
                placeholder="Tous les statuts"
                options={statusFilterOptions}
                value={filterStatus}
                onchange={handleStatusFilter}
                class="filter-item">
            </lightning-combobox>
            <lightning-slider
                label="Confiance min."
                min="50"
                max="100"
                step="5"
                value={filterConfidence}
                onchange={handleConfidenceFilter}
                class="filter-slider">
            </lightning-slider>
            <span class="filter-confidence-label">>= {filterConfidence}%</span>
        </div>

        <!-- Duplicates Table -->
        <lightning-card icon-name="utility:merge">
            <div slot="title">
                Groupes de doublons
                <lightning-badge label={groupesLabel}></lightning-badge>
            </div>
            <div slot="actions">
                <lightning-button label="Tout selectionner" variant="base" onclick={handleSelectAll}></lightning-button>
                <lightning-button label="Deselectionner" variant="base" onclick={handleDeselectAll}></lightning-button>
            </div>
            <div class="slds-var-p-around_none">
                <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_fixed-layout">
                    <thead>
                        <tr class="slds-line-height_reset">
                            <th class="col-check"><input type="checkbox" onchange={handleSelectAllToggle} checked={allSelected}/></th>
                            <th>Objet</th>
                            <th>Enregistrement principal</th>
                            <th>Doublon(s)</th>
                            <th>Regle utilisee</th>
                            <th>Confiance</th>
                            <th>Champs differents</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={filteredGroups} for:item="group">
                            <tr key={group.id} class={group.rowClass}>
                                <td class="col-check">
                                    <input
                                        type="checkbox"
                                        checked={group.selected}
                                        data-group-id={group.id}
                                        onchange={handleRowSelect}>
                                </td>
                                <td>
                                    <div class="obj-pill" style={group.objPillStyle}>{group.objectLabel}</div>
                                </td>
                                <td>
                                    <div class="record-link">{group.masterName}</div>
                                    <div class="record-sub">{group.masterId}</div>
                                </td>
                                <td>
                                    <div class="dupe-names">
                                        <template for:each={group.duplicateNames} for:item="dname">
                                            <span key={dname} class="dupe-tag">{dname}</span>
                                        </template>
                                    </div>
                                </td>
                                <td class="cell-rule">{group.ruleName}</td>
                                <td>
                                    <div class="confidence-display">
                                        <div class="confidence-bar">
                                            <div class="confidence-fill" style={group.confidenceStyle}></div>
                                        </div>
                                        <span class="confidence-pct" style={group.confidenceTextStyle}>{group.confidenceLabel}</span>
                                    </div>
                                </td>
                                <td class="cell-diff">{group.diffFieldsLabel}</td>
                                <td>
                                    <lightning-badge label={group.statusLabel} class={group.statusClass}></lightning-badge>
                                </td>
                                <td>
                                    <div class="action-btns">
                                        <lightning-button-icon
                                            icon-name="utility:preview"
                                            variant="border-filled"
                                            size="small"
                                            title="Previsualiser"
                                            data-group-id={group.id}
                                            onclick={handlePreview}>
                                        </lightning-button-icon>
                                        <lightning-button-icon
                                            icon-name="utility:merge"
                                            variant="border-filled"
                                            size="small"
                                            title="Fusionner"
                                            data-group-id={group.id}
                                            onclick={handleMergeOne}>
                                        </lightning-button-icon>
                                        <lightning-button-icon
                                            icon-name="utility:close"
                                            variant="border-filled"
                                            size="small"
                                            title="Ignorer"
                                            data-group-id={group.id}
                                            onclick={handleIgnore}>
                                        </lightning-button-icon>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="pagination" slot="footer">
                <span class="pagination-info">Affichage {paginationStart} - {paginationEnd} sur {filteredGroups.length}</span>
                <lightning-button-icon icon-name="utility:chevronleft" variant="border-filled" size="small" disabled={isPrevDisabled} onclick={handlePrevPage}></lightning-button-icon>
                <span class="page-indicator">Page {currentPage} / {totalPages}</span>
                <lightning-button-icon icon-name="utility:chevronright" variant="border-filled" size="small" disabled={isNextDisabled} onclick={handleNextPage}></lightning-button-icon>
            </div>
        </lightning-card>

        <!-- Merge Preview Modal -->
        <template if:true={showPreviewModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={handleClosePreview}>
                            <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title">Previsualisation de fusion - {previewGroup.masterName}</h2>
                    </header>
                    <div class="slds-modal__content slds-var-p-around_medium">
                        <div class="preview-grid">
                            <template for:each={previewGroup.fieldComparison} for:item="field">
                                <div key={field.id} class="preview-row">
                                    <div class="preview-field-name">{field.label}</div>
                                    <div class={field.masterClass} onclick={handleSelectMasterValue} data-field={field.id} data-source="master">
                                        <div class="preview-source">Enregistrement principal</div>
                                        <div class="preview-value">{field.masterValue}</div>
                                    </div>
                                    <div class={field.dupeClass} onclick={handleSelectDupeValue} data-field={field.id} data-source="dupe">
                                        <div class="preview-source">Doublon</div>
                                        <div class="preview-value">{field.dupeValue}</div>
                                    </div>
                                    <div class="preview-result">
                                        <div class="preview-source">Resultat final</div>
                                        <div class="preview-value preview-value--result">{field.selectedValue}</div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Annuler" onclick={handleClosePreview}></lightning-button>
                        <lightning-button label="Ignorer ce groupe" onclick={handleIgnoreFromPreview}></lightning-button>
                        <lightning-button variant="brand" label="Confirmer la fusion" icon-name="utility:merge" onclick={handleConfirmMerge}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
