name: PR Validation - PMD + Scratch Org + Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'force-app/**'

env:
  SF_USE_GENERIC_UNIX_KEYCHAIN: true
  SF_DOMAIN_RETRY: 300
  SF_DISABLE_APP_HUB: false
  SF_LOG_LEVEL: DEBUG

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : PMD Static Code Analysis
  # ─────────────────────────────────────────
  pmd-check:
    name: PMD Static Analysis
    runs-on: ubuntu-latest
    permissions: read-all

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PMD
        uses: pmd/pmd-github-action@v2
        with:
          rulesets: 'config/ruleset.xml'
          sourcePath: 'force-app/main/default'
          version: latest
          analyzeModifiedFilesOnly: true
          createGitHubAnnotations: true
          uploadSarifReport: false

  # ─────────────────────────────────────────
  # JOB 2 : Validate on Scratch Org + Tests
  # ─────────────────────────────────────────
  validate-scratch-org:
    name: Validate on Scratch Org
    runs-on: ubuntu-latest
    needs: pmd-check   # Lance seulement si PMD passe

    steps:
      # 1. Checkout
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3. Install Salesforce CLI
      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          sf --version

      # 4. Install SFDX Git Delta
      - name: Install SFDX Git Delta
        run: |
          echo y | sf plugins install sfdx-git-delta

      # 5. Auth Dev Hub via JWT
      - name: Create Dev Hub JWT Key File
        run: |
          echo "${{ secrets.DEVHUB_JWT_KEY }}" > devhub-key.txt
          chmod 600 devhub-key.txt

      - name: Authenticate Dev Hub
        run: |
          sf org login jwt \
            --client-id ${{ secrets.DEVHUB_CLIENT_ID }} \
            --jwt-key-file devhub-key.txt \
            --username ${{ secrets.DEVHUB_USERNAME }} \
            --instance-url https://login.salesforce.com \
            --set-default-dev-hub \
            --alias DevHub
          rm devhub-key.txt

      - name: Verify Dev Hub Auth
        run: sf org display --target-org DevHub

      # 6. Create Scratch Org
      - name: Create Scratch Org
        run: |
          sf org create scratch \
            --definition-file config/project-scratch-def.json \
            --alias ScratchOrg \
            --duration-days 1 \
            --set-default \
            --wait 15

      # 7. Generate Delta Package with SGD
      - name: Generate Delta Package (SGD)
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Delta from $BASE_SHA to $HEAD_SHA"
          mkdir -p delta

          sf sgd:source:delta \
            --to "$HEAD_SHA" \
            --from "$BASE_SHA" \
            --output-dir delta \
            --generate-delta

          echo "=== package.xml généré ==="
          cat delta/package/package.xml || echo "Aucun package.xml généré"

          # Si rien n'a changé, skip le déploiement
          if [ ! -f "delta/package/package.xml" ] || [ ! -s "delta/package/package.xml" ]; then
            echo "SKIP_DEPLOYMENT=true" >> $GITHUB_ENV
          else
            echo "SKIP_DEPLOYMENT=false" >> $GITHUB_ENV
          fi

      # 8. Deploy delta to Scratch Org
      - name: Deploy to Scratch Org
        if: env.SKIP_DEPLOYMENT == 'false'
        run: |
          sf project deploy start \
            --manifest delta/package/package.xml \
            --target-org ScratchOrg \
            --wait 30

      # 9. Run Apex Tests
      - name: Run Apex Tests
        if: env.SKIP_DEPLOYMENT == 'false'
        run: |
          sf apex run test \
            --target-org ScratchOrg \
            --code-coverage \
            --result-format human \
            --output-dir test-results \
            --wait 20

      # 10. Upload test results as artifact
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apex-test-results-pr
          path: test-results/

      # 11. Cleanup - Delete Scratch Org (toujours)
      - name: Delete Scratch Org
        if: always()
        run: |
          sf org delete scratch \
            --target-org ScratchOrg \
            --no-prompt