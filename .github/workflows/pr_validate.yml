name: PR Validation - PMD + Scratch Org + Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'force-app/**'

env:
  SF_USE_GENERIC_UNIX_KEYCHAIN: true
  SF_DOMAIN_RETRY: 300
  SF_DISABLE_APP_HUB: false
  SF_LOG_LEVEL: DEBUG

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : PMD Static Code Analysis
  # ─────────────────────────────────────────
  pmd-check:
    name: PMD Static Analysis
    runs-on: ubuntu-latest
    permissions: read-all

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PMD
        uses: pmd/pmd-github-action@v2
        with:
          rulesets: 'config/ruleset.xml'
          sourcePath: 'force-app/main/default'
          version: latest
          analyzeModifiedFilesOnly: true
          createGitHubAnnotations: true
          uploadSarifReport: false

  # ─────────────────────────────────────────
  # JOB 2 : Validate on Scratch Org + Tests
  # ─────────────────────────────────────────
  validate-scratch-org:
    name: Validate on Scratch Org
    runs-on: ubuntu-latest
    needs: pmd-check

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          sf --version

      - name: Install SFDX Git Delta
        run: |
          echo y | sf plugins install sfdx-git-delta

      - name: Auth Dev Hub via JWT
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > devhub-key.txt
          chmod 600 devhub-key.txt
          sf org login jwt \
            --client-id ${{ secrets.SF_CLIENT_ID }} \
            --jwt-key-file devhub-key.txt \
            --username ${{ secrets.SF_USERNAME }} \
            --instance-url ${{ secrets.SF_INSTANCE_URL_P }} \
            --set-default-dev-hub \
            --alias DevHub
          rm devhub-key.txt

      # ✅ Connexion à la scratch org existante my-scratch
      - name: Authenticate Scratch Org via Auth URL
        run: |
          echo "${{ secrets.SCRATCH_ORG_SFDX_AUTH_URL }}" > scratch-auth.txt
          sf org login sfdx-url \
            --sfdx-url-file scratch-auth.txt \
            --alias ScratchOrg \
            --set-default
          rm scratch-auth.txt

      - name: Verify Scratch Org
        run: sf org display --target-org ScratchOrg

      - name: Generate Delta Package (SGD)
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Delta from $BASE_SHA to $HEAD_SHA"
          mkdir -p delta

          sf sgd:source:delta \
            --to "$HEAD_SHA" \
            --from "$BASE_SHA" \
            --output-dir delta \
            --generate-delta

          echo "=== package.xml généré ==="
          cat delta/package/package.xml || echo "Aucun package.xml généré"

          if [ ! -f "delta/package/package.xml" ] || [ ! -s "delta/package/package.xml" ]; then
            echo "SKIP_DEPLOYMENT=true" >> $GITHUB_ENV
          else
            echo "SKIP_DEPLOYMENT=false" >> $GITHUB_ENV
          fi

      - name: Deploy to Scratch Org
        if: env.SKIP_DEPLOYMENT == 'false'
        run: |
          sf project deploy start \
            --manifest delta/package/package.xml \
            --target-org ScratchOrg \
            --ignore-conflicts \
            --wait 30

      - name: Run Apex Tests
        if: env.SKIP_DEPLOYMENT == 'false'
        run: |
          sf apex run test \
            --test-level RunLocalTests \
            --target-org ScratchOrg \
            --code-coverage \
            --result-format human \
            --output-dir test-results \
            --wait 20

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apex-test-results-pr
          path: test-results/

      # ✅ Aucune suppression — la scratch org my-scratch reste intacte
